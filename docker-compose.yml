services:
  potg-db:
    image: postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - potg-db-data:/var/lib/postgresql/data
    networks:
      - default
      - potg-network
    env_file:
      - .env
    ports:
      - "5432:5432"

  potg-redis:
    image: redis:7-alpine
    restart: always
    networks:
      - default
      - potg-network
    ports:
      - "6379:6379"

  potg-backend:
    image: potg-backend:latest
    restart: always
    container_name: potg-backend
    networks:
      - default
      - potg-network
    depends_on:
      potg-db:
        condition: service_healthy
    env_file:
      - .env
    build:
      context: .
    ports:
      - "3000:3000"

volumes:
  potg-db-data:

networks:
  default:
  potg-network:
    driver: bridge